<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>add new patient</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <form th:action="@{/patient/add}" th:object="${patient}" method="post">
            <input type="text" th:field="*{vorname}" class="form-control" placeholder="Patient Vorname">
            <input type="text" th:field="*{nachname}" class="form-control" placeholder="Patient Nachname">
            <input type="date" th:field="*{birth}" class="form-control">
            <select th:field="*{geschlecht}" class="form-control">
                <option value="">-- Select Gender --</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>
            <input type="submit" class="form-control" value="Save">
        </form>
    </div>
</body>
</html>
